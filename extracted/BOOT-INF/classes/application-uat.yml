#mybatis
mybatis-plus:
  mapper-locations: 
   - classpath:mapper/**/*.xml
   - classpath:/mapper/sys/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.tpfh.fintech.modules.*.entity
  global-config:
    #主键类型  0:"数据库ID自增", 1:"用户输入ID",2:"全局唯一ID (数字类型唯一ID)", 3:"全局唯一ID UUID";
    id-type: 0
    #字段策略 0:"忽略判断",1:"非 NULL 判断"),2:"非空判断"
    field-strategy: 2
    #驼峰下划线转换
    db-column-underline: true
    #刷新mapper 调试神器
    refresh-mapper: true
    #数据库大写下划线转换
    #capital-mode: true
    #序列接口实现类配置
    #key-generator: com.baomidou.springboot.xxx
    #逻辑删除配置
    logic-delete-value: -1
    logic-not-delete-value: 0
    #自定义填充策略接口实现
    #meta-object-handler: com.baomidou.springboot.xxx
    #自定义SQL注入器
    sql-injector: com.baomidou.mybatisplus.mapper.LogicSqlInjector
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    
logging:
    config: classpath:logback-spring.xml   #默认springboot会取 logback-spring.xml的配置文件，也可以在这里指定具体文件 modify by owen in 20230614
    file: myy.log
    level: 
      com.tpfh.fintech: info
      tech.kiwa: info
      org.springframework.mail: info